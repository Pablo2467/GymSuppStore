<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GymSupp Store - Iniciar Sesión</title>
    <link rel="stylesheet" th:href="@{/style.css}"/>
    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
            position: relative;
            overflow: hidden;
        }

        /* Círculos decorativos de fondo */
        body::before {
            content: '';
            position: absolute;
            width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(37,99,235,0.15) 0%, transparent 70%);
            top: -200px; left: -200px;
            border-radius: 50%;
        }
        body::after {
            content: '';
            position: absolute;
            width: 400px; height: 400px;
            background: radial-gradient(circle, rgba(16,163,74,0.1) 0%, transparent 70%);
            bottom: -100px; right: -100px;
            border-radius: 50%;
        }

        .login-wrapper {
            width: 100%;
            max-width: 540px;
            padding: 1.5rem;
            position: relative;
            z-index: 1;
        }

        .login-card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px;
            padding: 3rem 3.5rem;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        .login-logo {
            text-align: center;
            margin-bottom: 2rem;
        }

        .login-logo .logo-icon {
            font-size: 3rem;
            display: block;
            margin-bottom: .5rem;
            filter: drop-shadow(0 0 20px rgba(37,99,235,0.5));
        }

        .login-logo h1 {
            color: white;
            font-size: 1.75rem;
            font-weight: 800;
            margin-bottom: .25rem;
        }

        .login-logo h1 span { color: #60a5fa; }

        .login-logo p {
            color: #94a3b8;
            font-size: .85rem;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-group label {
            display: block;
            color: #cbd5e1;
            font-size: .8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: .05em;
            margin-bottom: .5rem;
        }

        .input-wrapper {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1rem;
        }

        .form-group input {
            width: 100%;
            padding: .75rem 1rem .75rem 2.75rem;
            background: rgba(255,255,255,0.08);
            border: 1.5px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            color: white;
            font-size: .95rem;
            transition: all .2s;
        }

        .form-group input::placeholder { color: #64748b; }

        .form-group input:focus {
            outline: none;
            border-color: #3b82f6;
            background: rgba(59,130,246,0.1);
            box-shadow: 0 0 0 3px rgba(59,130,246,0.2);
        }

        .btn-login {
            width: 100%;
            padding: .875rem;
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all .2s;
            margin-top: .5rem;
            letter-spacing: .02em;
            box-shadow: 0 4px 15px rgba(37,99,235,0.4);
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(37,99,235,0.5);
        }

        .btn-login:active { transform: translateY(0); }

        .error-msg {
            background: rgba(220,38,38,0.15);
            border: 1px solid rgba(220,38,38,0.3);
            color: #fca5a5;
            padding: .75rem 1rem;
            border-radius: 10px;
            font-size: .875rem;
            margin-bottom: 1.25rem;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: .5rem;
        }

        .divider {
            text-align: center;
            color: #475569;
            font-size: .8rem;
            margin: 1.5rem 0 1rem;
            position: relative;
        }

        .divider::before, .divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 35%;
            height: 1px;
            background: rgba(255,255,255,0.1);
        }
        .divider::before { left: 0; }
        .divider::after  { right: 0; }

        .credentials-hint {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 10px;
            padding: .875rem;
            font-size: .8rem;
            color: #64748b;
        }

        .credentials-hint p { margin-bottom: .3rem; }
        .credentials-hint p:last-child { margin-bottom: 0; }
        .credentials-hint strong { color: #94a3b8; }

        .footer-text {
            text-align: center;
            color: #475569;
            font-size: .75rem;
            margin-top: 1.5rem;
        }
    </style>
</head>
<body>
<div class="login-wrapper">
    <div class="login-card">

        <!-- LOGO -->
        <div class="login-logo">
            <img th:src="@{/logo2.png}" alt=""
                 style="width:80px; height:80px; object-fit:contain; margin-bottom:.5rem; display:block; margin-left:auto; margin-right:auto;"/>
            <h1><span>GymSupp</span> Store</h1>
            <p>Sistema de Gestión de Suplementos</p>
        </div>

        <!-- ERROR -->
        <div th:if="${param.error}" class="error-msg">
            ⚠️ Usuario o contraseña incorrectos
        </div>

        <!-- FORMULARIO -->
        <form th:action="@{/login}" method="post">
            <div class="form-group">
                <label>Usuario</label>
                <div class="input-wrapper">
                    <span class="input-icon"></span>
                    <input type="text" name="username"
                           placeholder="Ingresa tu usuario" required autofocus/>
                </div>
            </div>
            <div class="form-group">
                <label>Contraseña</label>
                <div class="input-wrapper">
                    <span class="input-icon"></span>
                    <input type="password" name="password"
                           placeholder="Ingresa tu contraseña" required/>
                </div>
            </div>
            <button type="submit" class="btn-login">
                Iniciar sesión →
            </button>
        </form>

        <div class="divider">credenciales disponibles</div>

        <div class="credentials-hint">
            <p>👑 <strong>Admin:</strong> admin / gym123</p>
            <p>🏪 <strong>Vendedor:</strong> vendedor / vend123</p>
        </div>

    </div>
</div>
</body>
</html>
