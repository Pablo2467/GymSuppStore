<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Producto - GymSupp Store</title>
    <link rel="stylesheet" th:href="@{/style.css}"/>
    <link rel="icon" type="image/x-icon" th:href="@{/favicon.ico.png}"/>
</head>
<body>

<nav class="navbar">
    <a href="/" class="navbar-brand">💪 <span>GymSupp</span> Store</a>
</nav>

<div class="container">
    <div class="card" style="max-width: 600px; margin: 2rem auto;">
        <div class="card-header">
            <div class="card-icon">✏️</div>
            <h2>Editar Producto</h2>
        </div>
        <form action="/update" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <input type="hidden" name="id" th:value="${product.id}"/>
            <div class="form-grid" style="grid-template-columns: 1fr;">
                <div class="form-group">
                    <label>Nombre</label>
                    <input type="text" name="name" th:value="${product.name}" required/>
                </div>
                <div class="form-group">
                    <label>Descripción</label>
                    <input type="text" name="description" th:value="${product.description}"/>
                </div>
                <div class="form-group">
                    <label>Precio (COP)</label>
                    <input type="number" name="price" th:value="${product.price}" step="0.01" required/>
                </div>
                <div class="form-group">
                    <label>Stock</label>
                    <input type="number" name="stock" th:value="${product.stock}" required/>
                </div>
                <div class="form-group">
                    <label>Categoría</label>
                    <input type="text" name="category" th:value="${product.category}"/>
                </div>
            </div>
            <div style="display:flex; gap:1rem; margin-top:1rem;">
                <button type="submit" class="btn btn-success">💾 Guardar cambios</button>
                <a href="/" class="btn btn-secondary">Cancelar</a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
